services:
  - type: web
    name: ims-backend
    env: node
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install && npx prisma generate && npm run build"
    startCommand: "cd backend && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ims-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://ims-backend.onrender.com"
      - key: PORT
        value: 3000

databases:
  - name: ims-db
    databaseName: ims
    user: ims_user
    plan: free
